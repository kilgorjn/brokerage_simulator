services:

  frontend:
    image: ghcr.io/kilgorjn/brokerage_simulator/frontend:latest
    ports:
      - "8100:8080"
    depends_on:
      brokerage:
        condition: service_healthy
      marketdata:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  marketdata:
    image: ghcr.io/kilgorjn/brokerage_simulator/marketdata:latest
    ports:
      - "8101:8001"
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  brokerage:
    image: ghcr.io/kilgorjn/brokerage_simulator/brokerage:latest
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      QUOTES_API_URL: http://marketdata:8001
      DATA_DIR: /data
    volumes:
      - brokerage-data:/data
    depends_on:
      marketdata:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/')"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  brokerage-data:
    driver: local
