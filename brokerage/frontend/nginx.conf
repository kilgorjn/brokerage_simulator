upstream brokerage_api {
    server brokerage:8000;
}

upstream marketdata_api {
    server marketdata:8001;
}

server {
    listen 8080;
    server_name _;

    # Serve static files (HTML, CSS, JS)
    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Proxy API calls to brokerage service
    location /api/ {
        proxy_pass http://brokerage_api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Proxy market data API calls
    location /marketdata/ {
        proxy_pass http://marketdata_api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Health check endpoint
    location /health {
        access_log off;
        return 200 "ok\n";
    }
}
